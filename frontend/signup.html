<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker - Sign Up</title>
<link rel="stylesheet" href="css/signup.css">

</head>

<body>
<div class="signup-container">

    <div class="signup-card">

        <h1>💰 Finance Tracker</h1>

        <p class="subtitle">
            Create Your Account 🚀
            <br>
            Start managing your finances smarter.
        </p>

        <form id="signup-form">

            <div class="input-group">

                <label for="name">
                    Full Name
                </label>

                <input
                    type="text"
                    id="name"
                    placeholder="Enter your name"
                    required>

            </div>

            <div class="input-group">

                <label for="email">
                    Email
                </label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    required>

            </div>

            <div class="input-group">

                <label for="password">
                    Password
                </label>

                <input
                    type="password"
                    id="password"
                    placeholder="Create a password"
                    required>

            </div>

            <div class="input-group">

                <label for="confirm-password">
                    Confirm Password
                </label>

                <input
                    type="password"
                    id="confirm-password"
                    placeholder="Confirm your password"
                    required>

            </div>

            <button type="submit">
                Create Account
            </button>

        </form>

        <p class="login-text">

            Already have an account?

            <a href="index.html">
                Login
            </a>

        </p>

    </div>

</div>

<script src="js/signup.js"></script>
</body>

</html>
